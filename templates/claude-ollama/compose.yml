# templates/claude-ollama — service definition.
#
# Usage from this folder:
#   install -m 0600 .env.example .env
#   ./setup-host.sh
#   docker compose run --rm agent                          # launch Claude Code against Ollama
#   docker compose run --rm agent --version                # claude with args
#   docker compose run --rm --entrypoint bash agent        # interactive shell
#   docker compose down -v                                 # stop + clean up

services:
  agent:
    build:
      context: .
      args:
        # Forwarded to the Dockerfile so the in-container `agent` user
        # matches your host UID/GID. Sourced from .env.
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: sannux/claude-ollama:latest

    # Use only local images
    pull_policy: never

    # Resource caps: not security; just limits for runaway commands.
    # Tune via .env to your VPS size or Docker Desktop allocation.
    mem_limit: ${MEM_LIMIT:-4g}
    cpus: ${CPU_LIMIT:-4}
    pids_limit: 512

    volumes:
      # Required bind mounts. Keep both host paths outside this repository:
      # WORKSPACE_PATH is the project Claude can edit; AGENT_HOME_PATH is the
      # persisted agent home with auth, config, history, logs, and memory.
      - type: bind
        source:
          ${WORKSPACE_PATH:?Set WORKSPACE_PATH in .env to an absolute host path
          outside this repo}
        target: /workspace
        bind:
          create_host_path: false
      - type: bind
        source:
          ${AGENT_HOME_PATH:?Set AGENT_HOME_PATH in .env to an absolute host
          path outside this repo}
        target: /home/agent
        bind:
          create_host_path: false

    # Allows Linux containers to reach an Ollama server running on the Docker
    # host through http://host.docker.internal:11434. If you use a LAN IP in
    # ANTHROPIC_BASE_URL, this is harmless.
    extra_hosts:
      - 'host.docker.internal:host-gateway'

    # Claude Code reads Ollama routing from environment variables. setup-host.sh
    # writes safe defaults into .env, but Compose still fails early if a required
    # value is missing.
    environment:
      TERM: ${SANNUX_TERM:-xterm-256color}
      COLORTERM: ${SANNUX_COLORTERM:-truecolor}
      FORCE_COLOR: ${SANNUX_FORCE_COLOR:-}
      ANTHROPIC_BASE_URL:
        ${ANTHROPIC_BASE_URL:?Set ANTHROPIC_BASE_URL in .env, for example
        http://host.docker.internal:11434}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL:
        ${ANTHROPIC_MODEL:?Set ANTHROPIC_MODEL in .env, for example
        example-ollama-model}

    # Claude Code is a TUI; it needs a TTY and stdin attached.
    stdin_open: true
    tty: true
    init: true

    working_dir: /workspace

    # The container is the sandbox boundary for this template, so Claude Code's
    # own permission prompts are disabled by default for the TUI. When passing
    # one-shot args, Compose replaces this command; include the permission flag
    # explicitly in that command.
    command:
      - --dangerously-skip-permissions
